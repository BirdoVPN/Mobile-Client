name: CodeQL Security Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            os: ubuntu-latest
            build-mode: manual
          - language: swift
            os: macos-14
            build-mode: manual

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 17
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      # Manual builds - CodeQL needs to observe the compiler.
      - name: Build Android (Kotlin)
        if: matrix.language == 'java-kotlin'
        run: |
          chmod +x ./gradlew
          ./gradlew :app:compileDebugKotlin :shared:compileDebugKotlinAndroid \
            -Pkotlin.native.ignoreDisabledTargets=true \
            --no-daemon

      - name: Select Xcode 16
        if: matrix.language == 'swift'
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -r | head -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -r | head -1)
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Build iOS (Swift)
        if: matrix.language == 'swift'
        working-directory: iosApp
        run: |
          brew install xcodegen
          xcodegen generate
          xcodebuild build \
            -project BirdoVPN.xcodeproj \
            -scheme BirdoVPN \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          category: '/language:${{ matrix.language }}'
