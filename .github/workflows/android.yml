name: Mobile CI (Android + iOS)

on:
  push:
    branches: [main, develop]
    tags:
      - 'android-v*'   # e.g. android-v1.2.0 - triggers release + Play Store upload
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag name for the draft release (e.g. android-v0.1.0). If empty, uses run id.'
        required: false
        default: ''

# FIX CI: Minimum permissions by default
permissions:
  contents: read

# -- Azure Key Vault (release signing) ------------------------------------------
# The release and release-aab jobs retrieve the Android signing keystore from
# Azure Key Vault using OIDC federation - no stored credentials in GitHub secrets.
#
# Required GitHub repository SECRETS:
#   AZURE_TENANT_ID   - Azure Active Directory tenant ID
#   AZURE_CLIENT_ID   - App registration (service principal) client ID
#
# Required GitHub repository VARIABLES (Settings -> Secrets and variables -> Variables):
#   AZURE_KEY_VAULT_NAME  - Key Vault name, e.g. "birdovpn-keyvault"
#
# Required Azure Key Vault secrets (create in Azure Portal or via az CLI):
#   android-keystore-base64   - base64-encoded release .jks keystore
#   android-store-password    - keystore password
#   android-key-alias         - signing key alias
#   android-key-password      - signing key password
#
# OIDC federated credential (add under App Registration -> Certificates & secrets ->
# Federated credentials with issuer https://token.actions.githubusercontent.com):
#   Subject for main-branch builds:  repo:<org>/<repo>:ref:refs/heads/main
#   Subject for tag-triggered builds: repo:<org>/<repo>:ref:refs/tags/*
#
# Role assignment: grant the app "Key Vault Secrets User" on the Key Vault resource.
# -------------------------------------------------------------------------------

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Check certificate pin expiry
        run: |
          # Extract pin-set expiration date from network_security_config.xml
          EXPIRY=$(grep -oP 'expiration="\K[^"]+' app/src/main/res/xml/network_security_config.xml)
          if [ -z "$EXPIRY" ]; then
            echo "::error::No pin-set expiration found in network_security_config.xml"
            exit 1
          fi
          EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
          echo "Certificate pins expire: $EXPIRY ($DAYS_LEFT days remaining)"
          if [ "$DAYS_LEFT" -lt 0 ]; then
            echo "::error::Certificate pins EXPIRED on $EXPIRY! App will fail to connect."
            exit 1
          elif [ "$DAYS_LEFT" -lt 60 ]; then
            echo "::warning::Certificate pins expire in $DAYS_LEFT days ($EXPIRY). Rotate pins NOW!"
          elif [ "$DAYS_LEFT" -lt 90 ]; then
            echo "::warning::Certificate pins expire in $DAYS_LEFT days ($EXPIRY). Plan pin rotation soon."
          else
            echo "Pin expiry OK: $DAYS_LEFT days remaining"
          fi

      - name: Run Lint
        run: |
          chmod +x ./gradlew
          ./gradlew lintDebug

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run Unit Tests
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Skip when Azure Key Vault is not configured (forks, dependabot PRs, contributors).
    if: ${{ vars.AZURE_KEY_VAULT_NAME != '' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/android-v') || github.event_name == 'workflow_dispatch') }}
    # Azure OIDC setup (keystore retrieved from Azure Key Vault - no GitHub secrets needed):
    #   Secrets:   AZURE_TENANT_ID, AZURE_CLIENT_ID
    #   Variables: AZURE_KEY_VAULT_NAME  (e.g. "birdovpn-keyvault")
    # Key Vault secrets required (names are case-sensitive):
    #   android-keystore-base64   - base64-encoded release keystore (.jks)
    #   android-store-password    - keystore password
    #   android-key-alias         - signing key alias inside the keystore
    #   android-key-password      - signing key password
    # OIDC federated credential subject (add in Azure App Registration):
    #   repo:<org>/<repo>:ref:refs/heads/main
    #   repo:<org>/<repo>:ref:refs/tags/*
    permissions:
      contents: read
      id-token: write  # Required for both Sigstore (Fulcio OIDC) and Azure AD OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # Log in to Azure using OIDC - no stored client secrets required.
      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      # Retrieve encrypted keystore + signing credentials from Azure Key Vault.
      # SEC: All secrets are masked with ::add-mask:: so they never appear in logs.
      # The keystore file is written to $RUNNER_TEMP (not the workspace) to prevent
      # accidental artifact upload or caching.
      - name: Retrieve Android keystore from Azure Key Vault
        run: |
          KS_B64=$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "android-keystore-base64" \
            --query value --output tsv)
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/birdo-release.jks"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/birdo-release.jks" >> "$GITHUB_ENV"

          STORE_PASS=$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "android-store-password" \
            --query value --output tsv)
          echo "::add-mask::$STORE_PASS"
          echo "RELEASE_STORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"

          KEY_ALIAS=$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "android-key-alias" \
            --query value --output tsv)
          echo "::add-mask::$KEY_ALIAS"
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"

          KEY_PASS=$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "android-key-password" \
            --query value --output tsv)
          echo "::add-mask::$KEY_PASS"
          echo "RELEASE_KEY_PASSWORD=$KEY_PASS" >> "$GITHUB_ENV"

      - name: Build Release APK
        # RELEASE_STORE_FILE, RELEASE_STORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD
        # are set as GITHUB_ENV by the Azure Key Vault step above.
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/birdo-release.jks"

      # -- Sigstore keyless signing --------------------------------------
      # Signs the APK with cosign using GitHub OIDC identity.
      # Produces a .sigstore bundle for each artifact so anyone can verify
      # this APK was built by this repo's GitHub Actions.
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign release APK with Sigstore
        run: |
          for apk in app/build/outputs/apk/release/*.apk; do
            cosign sign-blob --yes --bundle "${apk}.sigstore" "$apk"
            echo "Signed $(basename $apk) -> $(basename $apk).sigstore"
          done

      - name: Generate SHA256 checksums
        run: |
          cd app/build/outputs/apk/release
          sha256sum *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Sign checksums with Sigstore
        run: |
          cosign sign-blob --yes --bundle "app/build/outputs/apk/release/SHA256SUMS.txt.sigstore" "app/build/outputs/apk/release/SHA256SUMS.txt"

      # -- GPG detached signing (.asc) for sideload APK -----------------
      # Parity with desktop Linux pipeline so users can verify a sideloaded
      # APK using only `gpg --verify file.asc file` against the public key
      # published at https://birdo.app/.well-known/birdo-release.asc.
      # Required GitHub repository SECRETS:
      #   ANDROID_GPG_PRIVATE_KEY  - ASCII-armoured private key block
      #   ANDROID_GPG_PASSPHRASE   - passphrase for the private key
      #   ANDROID_GPG_KEY_ID       - long key ID (e.g. ABCDEF0123456789)
      - name: Detect GPG availability
        id: gpg-detect
        env:
          GPG_KEY: ${{ secrets.ANDROID_GPG_PRIVATE_KEY }}
          GPG_KID: ${{ secrets.ANDROID_GPG_KEY_ID }}
        run: |
          if [ -n "$GPG_KEY" ] && [ -n "$GPG_KID" ]; then
            echo "HAS_GPG=true"  >> "$GITHUB_ENV"
          else
            echo "HAS_GPG=false" >> "$GITHUB_ENV"
            echo "::warning::ANDROID_GPG_PRIVATE_KEY / ANDROID_GPG_KEY_ID not configured - skipping GPG signing"
          fi

      - name: Import GPG signing key
        if: ${{ env.HAS_GPG == 'true' }}
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.ANDROID_GPG_PRIVATE_KEY }}
          passphrase:      ${{ secrets.ANDROID_GPG_PASSPHRASE }}

      - name: GPG-sign release APK (detached .asc)
        if: ${{ env.HAS_GPG == 'true' }}
        run: |
          for apk in app/build/outputs/apk/release/*.apk; do
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${{ secrets.ANDROID_GPG_PASSPHRASE }}" \
                --local-user "${{ secrets.ANDROID_GPG_KEY_ID }}" \
                --armor --detach-sign --output "${apk}.asc" "$apk"
            echo "GPG-signed $(basename $apk) -> $(basename $apk).asc"
          done

      - name: GPG-sign SHA256SUMS (detached .asc)
        if: ${{ env.HAS_GPG == 'true' }}
        run: |
          SUMS="app/build/outputs/apk/release/SHA256SUMS.txt"
          gpg --batch --yes --pinentry-mode loopback \
              --passphrase "${{ secrets.ANDROID_GPG_PASSPHRASE }}" \
              --local-user "${{ secrets.ANDROID_GPG_KEY_ID }}" \
              --armor --detach-sign --output "${SUMS}.asc" "$SUMS"

      - name: Upload Release APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.sigstore
            app/build/outputs/apk/release/*.asc
            app/build/outputs/apk/release/SHA256SUMS.txt
            app/build/outputs/apk/release/SHA256SUMS.txt.sigstore
            app/build/outputs/apk/release/SHA256SUMS.txt.asc

      - name: Upload Mapping File
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mapping
          path: app/build/outputs/mapping/release/mapping.txt

  # L-12 FIX: Build AAB for Google Play Store submission
  release-aab:
    name: Build Release AAB
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Skip when Azure Key Vault is not configured (forks, dependabot PRs, contributors).
    if: ${{ vars.AZURE_KEY_VAULT_NAME != '' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/android-v') || github.event_name == 'workflow_dispatch') }}
    permissions:
      contents: read
      id-token: write  # Required for both Sigstore (Fulcio OIDC) and Azure AD OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # Log in to Azure using OIDC - no stored client secrets required.
      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          allow-no-subscriptions: true

      # SEC: All secrets are masked with ::add-mask:: so they never appear in logs.
      # The keystore file is written to $RUNNER_TEMP (not the workspace) to prevent
      # accidental artifact upload or caching.
      - name: Retrieve Android keystore from Azure Key Vault
        run: |
          KS_B64=$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "android-keystore-base64" \
            --query value --output tsv)
          echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/birdo-release.jks"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/birdo-release.jks" >> "$GITHUB_ENV"

          STORE_PASS=$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "android-store-password" \
            --query value --output tsv)
          echo "::add-mask::$STORE_PASS"
          echo "RELEASE_STORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"

          KEY_ALIAS=$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "android-key-alias" \
            --query value --output tsv)
          echo "::add-mask::$KEY_ALIAS"
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"

          KEY_PASS=$(az keyvault secret show \
            --vault-name "${{ vars.AZURE_KEY_VAULT_NAME }}" \
            --name "android-key-password" \
            --query value --output tsv)
          echo "::add-mask::$KEY_PASS"
          echo "RELEASE_KEY_PASSWORD=$KEY_PASS" >> "$GITHUB_ENV"

      - name: Build Release AAB
        # RELEASE_STORE_FILE, RELEASE_STORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD
        # are set as GITHUB_ENV by the Azure Key Vault step above.
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/birdo-release.jks"

      # -- Sigstore keyless signing --------------------------------------
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign release AAB with Sigstore
        run: |
          for aab in app/build/outputs/bundle/release/*.aab; do
            cosign sign-blob --yes --bundle "${aab}.sigstore" "$aab"
            echo "Signed $(basename $aab) -> $(basename $aab).sigstore"
          done

      - name: Upload Release AAB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-aab
          path: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/bundle/release/*.sigstore

  # -- Google Play Store Upload (internal track) ----------------------
  # Triggers ONLY on android-v* tags. Uploads the signed AAB to the Play
  # Console "internal" testing track. Promote manually to closed/open/prod.
  #
  # Required GitHub repository SECRETS:
  #   PLAY_SERVICE_ACCOUNT_JSON  - full JSON of a Google Play service account
  #                                with "Release manager" permission on the app.
  #
  # The service account is created in Google Cloud Console, then granted
  # access in Play Console -> Setup -> API access. The package name below must
  # match the one declared in app/build.gradle.kts (applicationId).
  play-store:
    name: Upload to Play Console (internal)
    runs-on: ubuntu-latest
    needs: release-aab
    if: startsWith(github.ref, 'refs/tags/android-v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download release AAB
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-aab
          path: release-aab/

      - name: Locate AAB
        id: locate
        run: |
          AAB=$(find release-aab -name '*.aab' | head -1)
          if [ -z "$AAB" ]; then
            echo "::error::No AAB found in release-aab/"
            exit 1
          fi
          echo "aab=$AAB" >> "$GITHUB_OUTPUT"

      - name: Upload AAB to Google Play (internal track)
        uses: r0adkll/upload-google-play@7f5b759879c088a86faf85d18779f7f14e79a086 # v1.1.4
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.birdo.vpn
          releaseFiles: ${{ steps.locate.outputs.aab }}
          track: internal
          status: completed
          inAppUpdatePriority: 2
          # mappingFile: app/build/outputs/mapping/release/mapping.txt
          # whatsNewDirectory: distribution/whatsnew

  # -- GitHub Draft Release (sideload APK for phone install) ----------
  # Publishes the signed release APK + sigstore bundle + GPG .asc + checksums
  # to a *draft* GitHub Release. Open the draft on github.com (or the GitHub
  # Mobile app) and tap the APK asset to install on your Android device.
  #
  # Triggers on:
  #   - any push of a tag matching android-v*
  #   - manual workflow_dispatch (uses inputs.release_tag, falling back to run id)
  draft-release:
    name: Publish Draft GitHub Release
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/android-v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download release APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-apk
          path: release-apk/

      - name: List artifacts
        run: ls -la release-apk/

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_TAG="${{ github.event.inputs.release_tag }}"
            if [ -n "$INPUT_TAG" ]; then
              TAG="$INPUT_TAG"
            else
              TAG="android-dispatch-${{ github.run_number }}"
            fi
          else
            TAG="${GITHUB_REF##*/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Create / update draft GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.4.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Birdo Android ${{ steps.tag.outputs.tag }}"
          draft: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/android-v') }}
          fail_on_unmatched_files: false
          body: |
            ## Birdo VPN - Android sideload build

            **Build:** `${{ steps.tag.outputs.tag }}`
            **Commit:** `${{ github.sha }}`

            ### Install
            Download the `.apk` asset below on your Android device and tap it to install.
            You may need to enable **Install unknown apps** for your browser / file manager.

            ### Verify (optional)
            - Sigstore: `cosign verify-blob --bundle <apk>.sigstore <apk>`
            - GPG:      `gpg --verify <apk>.asc <apk>`  (key: https://birdo.app/.well-known/birdo-release.asc)
            - SHA256:   `sha256sum -c SHA256SUMS.txt`

            > This is a **draft** release - not visible to the public until you click "Publish".
          files: |
            release-apk/*.apk
            release-apk/*.apk.sigstore
            release-apk/*.apk.asc
            release-apk/SHA256SUMS.txt
            release-apk/SHA256SUMS.txt.sigstore
            release-apk/SHA256SUMS.txt.asc
