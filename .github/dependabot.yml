version: 2
updates:
  # Gradle (Android + KMP shared)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "android"
    # Don't bump dependencies that require a newer Kotlin than we currently use.
    # Ktor 3.4+ requires Kotlin 2.3+; we're on 2.1. Let the kotlin group bump first.
    ignore:
      # Ktor 3.4+ requires Kotlin 2.3; we're on 2.1
      - dependency-name: "io.ktor:*"
        versions: [">=3.4.0"]
      # Major bumps that require code/Gradle migrations - hold for manual upgrade
      - dependency-name: "androidx.compose.compiler:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "com.android.library"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "com.squareup.okhttp3:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.squareup.retrofit2:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "androidx.compose:compose-bom"
        update-types: ["version-update:semver-major"]
      # Gradle wrapper 9.x requires AGP 8.7+ + Kotlin 2.x — coordinated upgrade needed
      - dependency-name: "gradle"
        versions: [">=9.0.0"]
      # Need coordinated bump of Kotlin to 2.3 (currently 2.1) - hold all
      - dependency-name: "org.jetbrains.kotlin:*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "org.jetbrains.kotlinx:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.google.devtools.ksp"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      # Hilt minor+ needs newer Kotlin/AGP
      - dependency-name: "com.google.dagger:*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      # AndroidX group bumps frequently require AGP minor+
      - dependency-name: "androidx.core:*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "androidx.activity:*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    groups:
      kotlin:
        patterns: ["org.jetbrains.kotlin*", "org.jetbrains.kotlinx*"]
      androidx:
        patterns: ["androidx.*"]
      compose:
        patterns: ["androidx.compose*"]
      hilt:
        patterns: ["com.google.dagger*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
