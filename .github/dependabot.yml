version: 2
updates:
  # Gradle (Android + KMP shared)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "android"
    # Don't bump dependencies that require a newer Kotlin than we currently use.
    # Ktor 3.4+ requires Kotlin 2.3+; we're on 2.1. Let the kotlin group bump first.
    ignore:
      - dependency-name: "io.ktor:*"
        versions: [">=3.4.0"]
      - dependency-name: "androidx.compose.compiler:*"
        update-types: ["version-update:semver-major"]
    groups:
      kotlin:
        patterns: ["org.jetbrains.kotlin*", "org.jetbrains.kotlinx*"]
      androidx:
        patterns: ["androidx.*"]
      compose:
        patterns: ["androidx.compose*"]
      hilt:
        patterns: ["com.google.dagger*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
